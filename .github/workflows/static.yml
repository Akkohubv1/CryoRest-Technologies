  <!-- MODAL -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHead">
        <b id="modalTitle">Request early access</b>
        <div class="x" id="closeModalBtn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
      </div>
      <div class="pad">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" placeholder="you@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="interest">Interested as</label>
          <select id="interest">
            <option>Individual buyer</option>
            <option>Athlete / coach</option>
            <option>Luxury hotel / resort</option>
            <option>Recovery center / clinic</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="msg">Message (optional)</label>
          <textarea id="msg" placeholder="Demo, partnership, bulk order, etc."></textarea>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn primary" id="submitBtn" type="button">Submit request</button>
          <button class="btn" id="copyBtn" type="button">Copy message</button>
        </div>

        <div class="toast" id="toast">Saved locally (demo). Hook this to your backend/email service when ready.</div>

        <p style="margin:10px 0 0; color:var(--muted); font-size:12px; line-height:1.45;">
          Demo form: it stores submissions in your browser so you can test the UX. Replace with Formspree/Mailchimp/HubSpot or your API.
        </p>
      </div>
    </div>
  </div>

  <script>
    // ===== Helpers
    const $ = (q, el=document) => el.querySelector(q);
    const $$ = (q, el=document) => Array.from(el.querySelectorAll(q));
    const money = (n) => n.toLocaleString(undefined, { style:"currency", currency:"USD", maximumFractionDigits:0 });

    // ===== Year
    $("#year").textContent = new Date().getFullYear();

    // ===== Mobile menu
    const burgerBtn = $("#burgerBtn");
    const menu = $("#menu");
    burgerBtn?.addEventListener("click", () => {
      const isHidden = menu.hasAttribute("hidden");
      if (isHidden) menu.removeAttribute("hidden");
      else menu.setAttribute("hidden", "");
    });
    $$("#menu a").forEach(a => a.addEventListener("click", () => menu.setAttribute("hidden","")));

    // ===== Modal
    const modal = $("#modal");
    const openBtns = $$("[data-open-modal]");
    const closeBtn = $("#closeModalBtn");
    const toast = $("#toast");

    function openModal(){
      modal.classList.add("open");
      modal.setAttribute("aria-hidden","false");
      toast.classList.remove("show");
      setTimeout(() => $("#name").focus(), 60);
    }
    function closeModal(){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden","true");
    }
    openBtns.forEach(btn => btn.addEventListener("click", openModal));
    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e)=> { if(e.target === modal) closeModal(); });
    document.addEventListener("keydown", (e)=> { if(e.key === "Escape" && modal.classList.contains("open")) closeModal(); });

    // Save submissions locally (demo)
    $("#submitBtn").addEventListener("click", () => {
      const payload = {
        name: $("#name").value.trim(),
        email: $("#email").value.trim(),
        interest: $("#interest").value,
        message: $("#msg").value.trim(),
        ts: new Date().toISOString()
      };
      const key = "cryorest_leads";
      const existing = JSON.parse(localStorage.getItem(key) || "[]");
      existing.unshift(payload);
      localStorage.setItem(key, JSON.stringify(existing).slice(0, 200000)); // keep it small
      toast.classList.add("show");
    });

    // Copy message to clipboard (handy for pasting into email)
    $("#copyBtn").addEventListener("click", async () => {
      const text =
`CryoRest Early Access Request
Name: ${$("#name").value.trim()}
Email: ${$("#email").value.trim()}
Interested as: ${$("#interest").value}
Message: ${$("#msg").value.trim()}`;
      try{
        await navigator.clipboard.writeText(text);
        toast.textContent = "Copied to clipboard.";
        toast.classList.add("show");
      }catch{
        toast.textContent = "Couldn’t copy (browser blocked).";
        toast.classList.add("show");
      }
    });

    // ===== Tabs
    const tabs = $$(".tab");
    const panels = $$(".tabPanel");
    tabs.forEach(t => t.addEventListener("click", () => {
      tabs.forEach(x => { x.classList.remove("active"); x.setAttribute("aria-selected","false"); });
      panels.forEach(p => p.hidden = true);

      t.classList.add("active");
      t.setAttribute("aria-selected","true");
      const id = t.dataset.tab;
      $("#" + id).hidden = false;
    }));

    // ===== Calculator
    const basePrice = 4999;
    const premiumPrice = 6999;
    const subPrice = 29;

    const unitsEl = $("#units");
    const mixEl = $("#mix");
    const attachEl = $("#attach");
    const monthsEl = $("#months");

    const hwRevEl = $("#hwRev");
    const subRevEl = $("#subRev");
    const totalRevEl = $("#totalRev");
    const subsCountEl = $("#subsCount");
    const calcToast = $("#calcToast");

    function calc(){
      const units = Math.max(0, parseInt(unitsEl.value || "0", 10));
      const mix = Math.min(100, Math.max(0, parseFloat(mixEl.value || "0"))) / 100;
      const attach = Math.min(100, Math.max(0, parseFloat(attachEl.value || "0"))) / 100;
      const months = Math.min(12, Math.max(1, parseInt(monthsEl.value || "12", 10)));

      const premiumUnits = Math.round(units * mix);
      const baseUnits = units - premiumUnits;

      const hw = baseUnits * basePrice + premiumUnits * premiumPrice;
      const subs = Math.round(units * attach);
      const sub = subs * subPrice * months;

      hwRevEl.textContent = money(hw);
      subRevEl.textContent = money(sub);
      totalRevEl.textContent = money(hw + sub);
      subsCountEl.textContent = subs.toLocaleString();

      calcToast.classList.add("show");
      setTimeout(() => calcToast.classList.remove("show"), 1200);
    }

    $("#calcBtn").addEventListener("click", calc);
    $("#resetBtn").addEventListener("click", () => {
      unitsEl.value = "2000";
      mixEl.value = "35";
      attachEl.value = "50";
      monthsEl.value = "12";
      calc();
    });
    calc();

    // ===== Temperature animation (visual only)
    const tempReadout = $("#tempReadout");
    let t = 62, dir = 1;
    setInterval(() => {
      t += dir * 0.18;
      if (t > 66) dir = -1;
      if (t < 60) dir = 1;
      tempReadout.textContent = `${Math.round(t)}°F`;
    }, 520);

    // ===== Scroll reveal
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add("on"); });
    }, { threshold: 0.12 });

    $$(".reveal").forEach(el => obs.observe(el));
  </script>
</body>
</html>
