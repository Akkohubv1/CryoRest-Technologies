<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryoRest Technologies — CryoRest™ Regenerative Sleep Bed</title>
  <meta name="description" content="CryoRest™ is a regenerative sleep system with adaptive cryo-thermal micro-cycling, biometric sensors, and AI recovery optimization." />
  <meta name="theme-color" content="#070A18" />

  <!-- Open Graph (optional) -->
  <meta property="og:title" content="CryoRest™ — Recover While You Sleep" />
  <meta property="og:description" content="Adaptive cryo-thermal micro-cycling + biometric AI for regenerative recovery during sleep." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="cryorest_hero_bg.png" />

  <style>
    :root{
      --bg:#050711;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.10);
      --line: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --ice: #4fd1ff;
      --heat:#ff5a8b;
      --good:#6ee7b7;
      --warn:#fde68a;

      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --shadow2: 0 16px 36px rgba(79,209,255,.12);

      --r: 18px;
      --r2: 26px;
      --max: 1180px;

      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background: #050711;
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    .container{ width:min(var(--max), calc(100% - 40px)); margin:0 auto; }

    /* Background layers */
    .bg{
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(79,209,255,.18), transparent 60%),
        radial-gradient(1000px 700px at 85% 15%, rgba(255,90,139,.14), transparent 58%),
        radial-gradient(900px 700px at 60% 95%, rgba(110,231,183,.10), transparent 62%),
        linear-gradient(180deg, #050711, #070a18 40%, #050611);
    }
    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background: url("cryorest_texture.png") center/cover no-repeat;
      opacity:.22;
      mix-blend-mode: screen;
      filter: blur(.2px);
    }

    /* Sticky header */
    header{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(6,9,20,.86), rgba(6,9,20,.52));
      border-bottom: 1px solid var(--line);
    }
    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding: 14px 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:220px;
    }
    .logo{
      width:36px;height:36px;border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 30% 30%, rgba(79,209,255,.95), rgba(79,209,255,.12) 58%, transparent 60%),
        radial-gradient(circle at 70% 70%, rgba(255,90,139,.85), rgba(255,90,139,.10) 62%, transparent 65%),
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.02));
      box-shadow: 0 14px 36px rgba(79,209,255,.12);
    }
    .brand .t1{
      margin:0;
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: rgba(255,255,255,.86);
    }
    .brand .t2{
      margin-top:2px;
      display:block;
      font-size:12px;
      letter-spacing:.06em;
      color: var(--muted);
    }

    nav ul{
      list-style:none;
      margin:0;padding:0;
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    nav a{
      font-size:13px;
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: .18s ease;
    }
    nav a:hover{
      color: var(--text);
      border-color: var(--line);
      background: rgba(255,255,255,.04);
    }

    .nav-cta{
      display:flex; gap:10px; align-items:center;
      flex-wrap:wrap; justify-content:flex-end;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.92);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
      transition: .18s ease;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      will-change: transform;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.07); }
    .btn:active{ transform: translateY(0px); }
    .btn.primary{
      border-color: rgba(79,209,255,.35);
      background: linear-gradient(135deg, rgba(79,209,255,.22), rgba(255,90,139,.18));
      box-shadow: var(--shadow2);
    }

    .icon{
      width:18px;height:18px; display:inline-block;
    }

    /* Mobile menu */
    .burger{ display:none; }
    .menu{
      display:none;
      border-top: 1px solid var(--line);
      padding: 12px 0 16px;
    }
    .menu a{
      display:block;
      padding: 10px 12px;
      border-radius: 14px;
      margin: 6px 0;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.82);
      font-size: 13px;
    }

    /* Sections */
    section{ padding: 30px 0; }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      margin-bottom: 14px;
    }
    .section-head h3{
      margin:0;
      font-size: 18px;
      letter-spacing:-.01em;
    }
    .section-head p{
      margin:0;
      color: var(--muted);
      font-size: 13px;
      max-width: 62ch;
      line-height:1.55;
    }

    .card{
      border-radius: var(--r2);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .pad{ padding: 18px; }

    .grid2{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
      align-items:stretch;
    }
    .grid3{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .split{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .box{
      border-radius: var(--r);
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      padding: 14px;
      min-height: 120px;
      position:relative;
      overflow:hidden;
    }
    .tag{
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,.70);
      letter-spacing:.08em;
      text-transform: uppercase;
    }
    .box h4{
      margin: 8px 0 6px;
      font-size: 15px;
    }
    .box p{
      margin:0;
      color: var(--muted);
      font-size: 13px;
      line-height:1.55;
    }

    /* HERO */
    .hero{
      padding: 42px 0 22px;
      position:relative;
    }
    .heroWrap{
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,.14);
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.42)),
        url("cryorest_hero_bg.png") center/cover no-repeat;
      box-shadow: 0 26px 70px rgba(0,0,0,.55);
    }
    .heroInner{
      padding: 26px;
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap: 18px;
      align-items:stretch;
      min-height: 420px;
    }
    .pill{
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.78);
      font-size:12px;
      width: fit-content;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: var(--ice);
      box-shadow: 0 0 16px rgba(79,209,255,.55);
    }
    .hero h1{
      margin: 14px 0 10px;
      font-size: 44px;
      line-height: 1.05;
      letter-spacing:-.02em;
    }
    .hero p{
      margin: 0 0 16px;
      color: rgba(255,255,255,.78);
      font-size: 15px;
      line-height:1.6;
      max-width: 65ch;
    }

    .heroActions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top: 12px;
    }
    .kpis{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 16px;
    }
    .kpi{
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.20);
      backdrop-filter: blur(10px);
      min-width: 150px;
    }
    .kpi b{ display:block; font-size: 16px; }
    .kpi span{ color: rgba(255,255,255,.70); font-size: 12px; }

    .heroAside{
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.24);
      backdrop-filter: blur(14px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height: 360px;
    }
    .heroAsideTop{
      padding: 14px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .meter{
      display:flex; align-items:center; gap:10px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,.86);
    }
    .meter i{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(180deg, var(--ice), var(--heat));
      box-shadow: 0 0 18px rgba(79,209,255,.30);
      display:inline-block;
    }
    .heroAsideBody{
      padding: 14px;
      display:grid;
      gap: 10px;
    }
    .mini{
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 12px;
      background: rgba(255,255,255,.04);
    }
    .mini b{ display:block; font-size: 13px; }
    .mini span{ display:block; margin-top:4px; color: rgba(255,255,255,.70); font-size: 12px; line-height:1.35; }

    /* Product section */
    .productRow{
      display:grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 14px;
      align-items:stretch;
    }
    .productShot{
      border-radius: 26px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      min-height: 360px;
      position:relative;
    }
    .productShot img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      transform: scale(1.02);
    }
    .productShot::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.35));
      pointer-events:none;
    }

    .bullets{
      margin:0;
      padding:0;
      list-style:none;
      display:grid;
      gap:10px;
    }
    .bullets li{
      display:flex; gap:10px; align-items:flex-start;
      font-size: 13px;
      color: rgba(255,255,255,.82);
      line-height:1.4;
    }
    .check{
      width:18px; height:18px; border-radius: 7px;
      background: rgba(110,231,183,.16);
      border: 1px solid rgba(110,231,183,.28);
      display:flex; align-items:center; justify-content:center;
      flex: 0 0 18px;
      margin-top: 1px;
    }
    .check svg{ width:12px;height:12px; }

    /* Tabs */
    .tabs{
      display:flex; gap:8px; flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .tab{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.78);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-size: 13px;
      transition:.18s ease;
    }
    .tab:hover{ background: rgba(255,255,255,.06); }
    .tab.active{
      border-color: rgba(79,209,255,.34);
      background: linear-gradient(135deg, rgba(79,209,255,.16), rgba(255,90,139,.10));
      color: rgba(255,255,255,.92);
    }

    /* Pricing */
    .pricing{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items:stretch;
    }
    .priceCard{
      border-radius: var(--r2);
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      padding: 16px;
      box-shadow: 0 18px 46px rgba(0,0,0,.30);
      position:relative;
      overflow:hidden;
    }
    .priceCard.featured{
      border-color: rgba(79,209,255,.34);
      background: linear-gradient(135deg, rgba(79,209,255,.14), rgba(255,90,139,.10));
    }
    .priceCard h4{ margin:0 0 6px; font-size:16px; }
    .price{
      font-size: 30px;
      margin: 8px 0 4px;
      letter-spacing:-.02em;
    }
    .sub{
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
      line-height:1.45;
    }

    /* Calculator */
    .calc{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items:stretch;
    }
    .field{
      display:grid; gap:6px;
      margin-bottom: 10px;
    }
    label{
      font-size:12px;
      color: rgba(255,255,255,.78);
    }
    input, select, textarea{
      width:100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.92);
      outline:none;
      font-size: 13px;
    }
    textarea{ min-height: 90px; resize: vertical; }

    .statGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat{
      border:1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,.04);
    }
    .stat b{ display:block; font-size: 13px; }
    .stat span{ display:block; margin-top:4px; color: rgba(255,255,255,.70); font-size: 12px; line-height:1.35; }

    /* Timeline */
    .timeline{
      display:grid;
      gap:10px;
    }
    .step{
      display:flex; gap:12px; align-items:flex-start;
      padding: 14px;
      border-radius: var(--r);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
    }
    .badge{
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing:.06em;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      color: rgba(255,255,255,.82);
      min-width: 120px;
      text-align:center;
      flex:0 0 auto;
    }
    .step b{ display:block; margin-bottom:4px; }
    .step span{ color: var(--muted); font-size: 13px; line-height:1.45; }

    /* Testimonials / logos */
    .logos{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
    }
    .logoChip{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.72);
      font-size: 12px;
      letter-spacing:.06em;
      font-family: var(--mono);
    }

    /* Footer */
    footer{
      padding: 28px 0 44px;
      border-top: 1px solid var(--line);
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }
    .foot{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    /* Modal */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      z-index: 100;
      padding: 20px;
    }
    .modal.open{ display:grid; }
    .modalCard{
      width:min(560px, 100%);
      border-radius: 22px;
      border:1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(12,16,34,.92), rgba(9,12,24,.92));
      box-shadow: 0 26px 70px rgba(0,0,0,.55);
      overflow:hidden;
    }
    .modalHead{
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .x{
      width:34px;height:34px;border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      display:grid; place-items:center;
      cursor:pointer;
    }
    .toast{
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,.85);
      border:1px solid rgba(110,231,183,.22);
      background: rgba(110,231,183,.10);
      padding: 10px 12px;
      border-radius: 14px;
      display:none;
    }
    .toast.show{ display:block; }

    /* Scroll reveal */
    .reveal{
      opacity:0;
      transform: translateY(10px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.on{
      opacity:1;
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 980px){
      nav ul{ display:none; }
      .burger{ display:inline-flex; }
      .menu{ display:block; }
      .heroInner{ grid-template-columns: 1fr; min-height: auto; }
      .grid2{ grid-template-columns: 1fr; }
      .grid3{ grid-template-columns: 1fr; }
      .split{ grid-template-columns: 1fr; }
      .pricing{ grid-template-columns: 1fr; }
      .calc{ grid-template-columns: 1fr; }
      .productRow{ grid-template-columns: 1fr; }
      .hero h1{ font-size: 38px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; scroll-behavior:auto !important; }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <header>
    <div class="container">
      <div class="nav">
        <a class="brand" href="#top" aria-label="CryoRest home">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <div class="t1">CryoRest Technologies</div>
            <span class="t2">CryoRest™ Regenerative Sleep Bed</span>
          </div>
        </a>

        <nav aria-label="Primary">
          <ul>
            <li><a href="#how">How it works</a></li>
            <li><a href="#modes">Modes</a></li>
            <li><a href="#market">Target market</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#plan">Action plan</a></li>
          </ul>
        </nav>

        <div class="nav-cta">
          <button class="btn burger" id="burgerBtn" type="button" aria-label="Open menu">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
              <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            Menu
          </button>
          <a class="btn" href="#pricing">View pricing</a>
          <button class="btn primary" data-open-modal type="button">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
            </svg>
            Request early access
          </button>
        </div>
      </div>

      <!-- Mobile dropdown -->
      <div class="menu" id="menu" hidden>
        <a href="#how">How it works</a>
        <a href="#modes">Modes</a>
        <a href="#market">Target market</a>
        <a href="#pricing">Pricing</a>
        <a href="#plan">Action plan</a>
      </div>
    </div>
  </header>

  <main id="top">
    <div class="container">

      <!-- HERO -->
      <section class="hero">
        <div class="heroWrap reveal">
          <div class="heroInner">
            <div>
              <div class="pill"><span class="dot"></span>World’s first adaptive cryogenic-regulated sleep system</div>
              <h1>Recover While You Sleep.</h1>
              <p>
                CryoRest™ turns nightly sleep into active recovery using controlled cryo-thermal micro-cycling, body-zoned temperature control,
                and biometric AI that adapts in real time across sleep stages.
              </p>

              <div class="heroActions">
                <button class="btn primary" data-open-modal type="button">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 21s-6-4.35-9-10a6 6 0 0 1 9-7 6 6 0 0 1 9 7c-3 5.65-9 10-9 10Z"/>
                  </svg>
                  Get a demo / waitlist
                </button>
                <a class="btn" href="#how">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v6"/><path d="M12 16v6"/><path d="M2 12h6"/><path d="M16 12h6"/><path d="M7 7l2 2"/><path d="M15 15l2 2"/><path d="M7 17l2-2"/><path d="M15 9l2-2"/>
