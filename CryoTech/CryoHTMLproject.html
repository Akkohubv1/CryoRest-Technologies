<html>
  <head>
    <meta charset="utf-8" />
    <style>
      #yourSentence {
        border: black 1px outset;
        display: none;
        margin: auto;
        position: relative;
        width: 50%;
        text-align: center;
      }
      .button {
        background-color: white;
        color: black;
        border: 2px solid #04aa6d;
        padding: 5px 10.6px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        border-radius: 10px;
        transition-duration: 0.4s;
        position: relative;
        margin: auto;
      }
      #wordCounted,
      #avgLetterCounted,
      #patternResult {
        border: black 1px outset;
        display: none;
        margin: auto;
        position: relative;
        width: 50%;
        text-align: center;
      }
      #WordCount:hover,
      #avgLetterCount:hover,
      #replacePattern:hover {
        background-color: #04aa6d;
        color: white;
      }
      #WordCount,
      #avgLetterCount,
      #replacePattern {
        background-color: white;
        color: black;
        border: 2px solid #04aa6d;
        padding: 5px 10.6px;
        text-align: center;
        display: inline;
        font-size: 16px;
        border-radius: 10px;
        transition-duration: 0.4s;
        position: relative;
        margin: auto;
      }
    </style>
    <script>
      let input = []
      let splitSentence = ""
      let toLowerCased = ""
      function getSentence() {
        input = prompt("Type in a sentence of your choosing")
        input = input.toLowerCase()
        splitSentence = input.split(" ")
        console.log(toLowerCased)
        console.log(input)
        console.log(splitSentence)
        document.getElementById("yourSentence").innerHTML = input
        document.getElementById("yourSentence").style.display = "inline"
      }

      function wordCounter() {
        let wordCount = splitSentence.length
        document.getElementById("wordCounted").innerHTML =
          "Word Count: " + wordCount
        document.getElementById("wordCounted").style.display = "inline"
        console.log(wordCount)
      }
      function avgletterCount() {
        let totalLetters = 0
        let i = 0
        while (i < splitSentence.length) {
          totalLetters += splitSentence[i].length
          i++
        }
        let avgLetter = parseInt(totalLetters / splitSentence.length)
        document.getElementById("avgLetterCounted").innerHTML =
          "Average Letter Count per Word: " + avgLetter
        document.getElementById("avgLetterCounted").style.display = "inline"
        console.log(totalLetters)
      }
      function pattern() {
        let whatPattern = prompt(
          "What pattern (word or letter) do you want to replace?",
        )
        let patternReplaced = prompt("What do you want to replace it with?")
        let i = 0
        let replacedSentence = ""
        const patternLength = whatPattern.length
        while (i < input.length) {
          let match = true
          let j = 0
          while (j < patternLength) {
            j++
            if (i + j >= input.length || input[i + j] !== whatPattern[j]) {
              match = false
              break
            }
          }
          if (match) {
            replacedSentence += patternReplaced
            i += patternLength
          } else {
            replacedSentence += input[i]
            i++
          }
        }
        document.getElementById("patternResult").innerHTML =
          "Updated Sentence: " + replacedSentence
        document.getElementById("patternResult").style.display = "inline"
        console.log(replacedSentence)
      }
    </script>
  </head>
  <body>
    <div class="wrap">
      <div class="button" id="String" onclick="getSentence()">Sentence</div>
      <span id="yourSentence"></span>
    </div>
    <br />
    <div class="wrap">
      <div class="button" id="WordCount" onclick="wordCounter()">
        Word Count
      </div>
      <span id="wordCounted"></span>
    </div>
    <br />
    <div class="wrap">
      <div class="button" id="avgLetterCount" onclick="avgletterCount()">
        Average Letter Count
      </div>
      <span id="avgLetterCounted"></span>
    </div>
    <br />
    <div class="wrap">
      <div class="button" id="replacePattern" onclick="pattern()">
        Replace Pattern
      </div>
      <span id="patternResult"></span>
    </div>
  </body>
</html>
